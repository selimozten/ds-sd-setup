name: Build & Release

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: brew install curl libarchive create-dmg

      - name: Build
        run: |
          cmake -B build -DCMAKE_BUILD_TYPE=Release
          cmake --build build --config Release

      - name: Ad-hoc sign the app
        run: codesign --force --deep -s - "build/DS SD Setup.app"

      - name: Create DMG
        run: |
          create-dmg \
            --volname "DS SD Setup" \
            --volicon "macos/app.icns" \
            --window-pos 200 120 \
            --window-size 600 400 \
            --icon-size 100 \
            --icon "DS SD Setup.app" 150 185 \
            --hide-extension "DS SD Setup.app" \
            --app-drop-link 450 185 \
            "DS-SD-Setup.dmg" \
            "build/DS SD Setup.app"

      - name: Prepare raw binary
        run: cp build/ds-sd-setup ds-sd-setup-macos-arm64

      - name: Upload DMG
        uses: actions/upload-artifact@v4
        with:
          name: ds-sd-setup-macos-dmg
          path: DS-SD-Setup.dmg

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: ds-sd-setup-macos-bin
          path: ds-sd-setup-macos-arm64

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libcurl4-openssl-dev libarchive-dev \
            libx11-dev libxrandr-dev libxinerama-dev \
            libxcursor-dev libxi-dev libgl-dev

      - name: Build
        run: |
          cmake -B build -DCMAKE_BUILD_TYPE=Release
          cmake --build build --config Release

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ds-sd-setup-linux
          path: build/ds-sd-setup

  build-windows:
    runs-on: windows-latest
    defaults:
      run:
        shell: msys2 {0}
    steps:
      - uses: actions/checkout@v4

      - uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-cmake
            mingw-w64-x86_64-ninja
            mingw-w64-x86_64-curl
            mingw-w64-x86_64-libarchive

      - name: Build
        run: |
          cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Release
          cmake --build build --config Release

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ds-sd-setup-windows
          path: build/ds-sd-setup.exe

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build-macos, build-linux, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Package binaries
        run: |
          mv ds-sd-setup-linux/ds-sd-setup ds-sd-setup-linux-x86_64
          mv ds-sd-setup-windows/ds-sd-setup.exe ds-sd-setup-windows-x86_64.exe
          chmod +x ds-sd-setup-linux-x86_64
          chmod +x ds-sd-setup-macos-bin/ds-sd-setup-macos-arm64

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            ds-sd-setup-macos-dmg/DS-SD-Setup.dmg
            ds-sd-setup-macos-bin/ds-sd-setup-macos-arm64
            ds-sd-setup-linux-x86_64
            ds-sd-setup-windows-x86_64.exe
